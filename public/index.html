<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>OPTICAL CHARACTER RECOGNITION (OCR)</title>
</head>
<body>
  <div class="container">
    <h1>OCR + Summarizer</h1>

    <div class="upload-section">
      <input type="file" id="image" accept="image/*">
      <img id="preview" src="" alt="Image Preview" style="display:none;">
    </div>

    <button id="extract-btn">Extract Text</button>

    <div class="results">
      <h2>Extracted Text:</h2>
      <pre id="ocr-text" class="ocr-text"></pre>
      <button id="copy-text-btn">Copy Extracted Text</button>

      <h2>Summary:</h2>
      <pre id="summary-text" class="summary-text"></pre>
      <button id="summarize-btn">Summarize</button>
      <button id="copy-summary-btn">Copy Summary</button>
    </div>
  </div>

  <script>
    const imageInput = document.getElementById('image');
    const preview = document.getElementById('preview');
    const extractBtn = document.getElementById('extract-btn');
    const summarizeBtn = document.getElementById('summarize-btn');
    const ocrText = document.getElementById('ocr-text');
    const summaryText = document.getElementById('summary-text');
    const copyTextBtn = document.getElementById('copy-text-btn');
    const copySummaryBtn = document.getElementById('copy-summary-btn');

    let extractedText = '';
    let extractedSummary = '';

    imageInput.addEventListener('change', () => {
      const file = imageInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = 'block';
      }
      reader.readAsDataURL(file);

      ocrText.textContent = '';
      summaryText.textContent = '';
    });

    extractBtn.addEventListener('click', async () => {
      const file = imageInput.files[0];
      if (!file) return alert('Upload an image first');

      const formData = new FormData();
      formData.append('image', file);

      ocrText.textContent = 'Processing...';
      summaryText.textContent = '';
      extractedText = '';
      extractedSummary = '';

      try {
        const res = await fetch('/extract-and-summarize', { method: 'POST', body: formData });
        const data = await res.json();
        extractedText = data.text;
        extractedSummary = data.summary;
        ocrText.textContent = extractedText;
      } catch (err) {
        ocrText.textContent = 'Error extracting text';
        console.error(err);
      }
    });

    summarizeBtn.addEventListener('click', () => {
      if (!extractedSummary) return alert('Extract text first');
      summaryText.textContent = extractedSummary;
    });

    copyTextBtn.addEventListener('click', () => {
      if (extractedText) navigator.clipboard.writeText(extractedText).then(() => alert('Copied!'));
    });
    copySummaryBtn.addEventListener('click', () => {
      if (extractedSummary) navigator.clipboard.writeText(extractedSummary).then(() => alert('Copied!'));
    });
  </script>
</body>
</html>
